<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="#4a90e2"/>
  <!-- Magnifying glass handle -->
  <line x1="85" y1="85" x2="108" y2="108" stroke="#ffffff" stroke-width="10" stroke-linecap="round"/>
  <!-- Magnifying glass circle -->
  <circle cx="55" cy="55" r="28" fill="none" stroke="#ffffff" stroke-width="9"/>
  <!-- X / strikethrough lines across lens (the "hider" element) -->
  <line x1="38" y1="38" x2="72" y2="72" stroke="#ff6b6b" stroke-width="7" stroke-linecap="round"/>
  <line x1="72" y1="38" x2="38" y2="72" stroke="#ff6b6b" stroke-width="7" stroke-linecap="round"/>
</svg>
